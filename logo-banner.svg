<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#111100"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="120" fill="url(#bannerBg)" rx="6"/>
  <!-- Border -->
  <rect x="1" y="1" width="598" height="118" fill="none" stroke="#D4AF37" stroke-width="1.5" rx="5" opacity="0.7"/>
  <!-- Diamond icon -->
  <g transform="translate(40,60)">
    <polygon points="0,-28 24,0 0,28 -24,0" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <polygon points="0,-15 13,0 0,15 -13,0" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#D4AF37"/>
    <circle cx="0" cy="-28" r="2.5" fill="#D4AF37"/>
    <circle cx="24" cy="0" r="2.5" fill="#D4AF37"/>
    <circle cx="0" cy="28" r="2.5" fill="#D4AF37"/>
    <circle cx="-24" cy="0" r="2.5" fill="#D4AF37"/>
  </g>
  <!-- Thin vertical separator -->
  <line x1="80" y1="20" x2="80" y2="100" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
  <!-- Title -->
  <text x="100" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" fill="#D4AF37" letter-spacing="1">SB689 OMEGA</text>
  <!-- Separator dot -->
  <text x="100" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#D4AF37" opacity="0.9" letter-spacing="2">· Sovereign Stitch ·</text>
  <!-- Tagline -->
  <text x="100" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#D4AF37" opacity="0.65" font-style="italic" letter-spacing="1">Elegance with Consequences  —  by John Arenz (J.G.A.)</text>
  <!-- Status badge area -->
  <rect x="490" y="40" width="94" height="24" rx="4" fill="#D4AF37" opacity="0.15" stroke="#D4AF37" stroke-width="1"/>
  <circle cx="505" cy="52" r="5" fill="#22c55e"/>
  <text x="516" y="56" font-family="'Courier New', monospace" font-size="10" fill="#D4AF37" letter-spacing="0.5">SB689_READY</text>
</svg>
