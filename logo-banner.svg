<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon with Lion -->
  <g transform="translate(60, 60)">
    <!-- Hexagon shape -->
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20"
             fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>

    <!-- Lion -->
    <circle cx="0" cy="-5" r="18" fill="url(#goldGrad)" opacity="0.3"/>
    <ellipse cx="0" cy="-5" rx="13" ry="15" fill="#d4af37"/>
    <path d="M-13,-8 L-16,-14 M-11,-13 L-13,-19 M-6,-15 L-6,-21 M0,-16 L0,-22 M6,-15 L6,-21 M11,-13 L13,-19 M13,-8 L16,-14"
          stroke="#d4af37" stroke-width="1.5" fill="none"/>
    <circle cx="-5" cy="-7" r="1.5" fill="#000"/>
    <circle cx="5" cy="-7" r="1.5" fill="#000"/>
    <path d="M0,-2 L-2,1 M0,-2 L2,1 M-4,3 Q0,5 4,3" stroke="#000" stroke-width="1" fill="none"/>
    <path d="M-9,8 L-11,16 M9,8 L11,16 M0,10 L0,18" stroke="#d4af37" stroke-width="2"/>

    <!-- JGA text below lion -->
    <text x="0" y="32" font-family="'Blackletter', 'Old English Text MT', serif"
          font-size="16" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="1">
      JGA
    </text>
  </g>

  <!-- Brand text -->
  <text x="130" y="45" font-family="Arial, sans-serif"
        font-size="32" font-weight="bold" fill="url(#goldGrad)" letter-spacing="1">
    JAY'S GRAPHIC ARTS
  </text>
  <text x="130" y="75" font-family="Arial, sans-serif"
        font-size="14" fill="#d4af37" letter-spacing="0.5">
    Excellence in Sovereign AI Systems
  </text>
  <text x="130" y="95" font-family="Arial, sans-serif"
        font-size="12" fill="#b8960f" font-style="italic">
    Resilience · Governance · Innovation
  </text>
</svg>
