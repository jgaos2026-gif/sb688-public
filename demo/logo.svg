<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a00"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#D4AF37" stroke-width="2"/>
  <!-- Stitch diamond -->
  <polygon points="50,12 80,50 50,88 20,50" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
  <!-- Inner diamond -->
  <polygon points="50,24 68,50 50,76 32,50" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.6"/>
  <!-- Center cross-links (stitch lines) -->
  <line x1="20" y1="50" x2="80" y2="50" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="12" x2="50" y2="88" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#D4AF37"/>
  <!-- Brick dots at diamond corners -->
  <circle cx="50" cy="12" r="3.5" fill="#D4AF37"/>
  <circle cx="80" cy="50" r="3.5" fill="#D4AF37"/>
  <circle cx="50" cy="88" r="3.5" fill="#D4AF37"/>
  <circle cx="20" cy="50" r="3.5" fill="#D4AF37"/>
  <!-- J.G.A. text -->
  <text x="50" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#D4AF37" letter-spacing="2">J.G.A.</text>
</svg>
