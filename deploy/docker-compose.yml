version: '3.8'

services:
  node-0:
    build: ..
    container_name: sb688-node-0
    environment:
      - NODE_ID=0
      - PEER_NODES=node-1,node-2,node-3,node-4
    ports:
      - "5000:5000"
    networks: [sb688-network]

  node-1:
    build: ..
    container_name: sb688-node-1
    environment:
      - NODE_ID=1
      - PEER_NODES=node-0,node-2,node-3,node-4
    ports:
      - "5001:5001"
    networks: [sb688-network]

  node-2:
    build: ..
    container_name: sb688-node-2
    environment:
      - NODE_ID=2
      - PEER_NODES=node-0,node-1,node-3,node-4
    ports:
      - "5002:5002"
    networks: [sb688-network]

  node-3:
    build: ..
    container_name: sb688-node-3
    environment:
      - NODE_ID=3
      - PEER_NODES=node-0,node-1,node-2,node-4
    ports:
      - "5003:5003"
    networks: [sb688-network]

  node-4:
    build: ..
    container_name: sb688-node-4
    environment:
      - NODE_ID=4
      - PEER_NODES=node-0,node-1,node-2,node-3
    ports:
      - "5004:5004"
    networks: [sb688-network]

networks:
  sb688-network:
    driver: bridge
